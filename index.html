<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Capture HardWork</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- Left Section -->
  <div class="left">
    <h2>Lets Capture your HardWork!</h2>
    <div class="photo">
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>
    </div>
  </div>

  <!-- Right Section -->
  <div class="right">
    <h2>Smile!</h2>
    <p>choose your style :</p>

    <div class="styles">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <div class="camera">📷</div>
    <button class="btn">click!</button>
  </div>

</div>


<div class="styles">
  <div class="box" data-style="normal"></div>
  <div class="box" data-style="bw"></div>
  <div class="box" data-style="warm"></div>
  <div class="box" data-style="cool"></div>
</div>



<script>
const boxes = document.querySelectorAll('.box');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const button = document.querySelector('.btn');

// AKSES KAMERA
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    alert("Kamera tidak bisa diakses!");
    console.error(err);
  });

// SAAT BUTTON DIKLIK
button.addEventListener('click', () => {
  const context = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // ambil gambar dari video
  context.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ubah ke gambar
  const image = canvas.toDataURL('image/png');

  // download otomatis
  const link = document.createElement('a');
  link.href = image;
  link.download = 'foto.png';
  link.click();
});



let selectedStyle = "normal";

// PILIH STYLE
boxes.forEach(box => {
  box.addEventListener('click', () => {
    boxes.forEach(b => b.classList.remove('active'));
    box.classList.add('active');

    selectedStyle = box.dataset.style;

    // preview langsung di kamera
    video.className = selectedStyle;
  });
});

// FOTO + PINDAH KE HALAMAN HASIL
button.addEventListener('click', () => {
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // apply filter ke canvas
  ctx.filter = getComputedStyle(video).filter;

  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL();

  // SIMPAN KE LOCAL STORAGE
  localStorage.setItem("photo", image);

  // PINDAH HALAMAN
  window.location.href = "result.html";
});

</script>

</body>
</html>
