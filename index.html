<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="top-bar">
    <div class="logo">logo poko</div>
    <div class="icons">
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
  </div>

  <div class="hero-content">
    <div class="star">★</div>
    <p class="desc">body text</p>
    <button class="btn">start button</button>
  </div>
</section>

<!-- SECTION 1 -->
<section class="section">
  <h2>head text</h2>

  <div class="cards">
    <div class="card">image<br>presentase<br>stream/poko activity</div>
    <div class="card">image<br>presentase<br>stream/poko activity</div>
  </div>

  <p class="text">body text body text</p>
</section>

<!-- SECTION 2 -->
<section class="section">
  <h2>head text</h2>

  <div class="grid">
    <div>
      <p>body text</p>
      <h3>head text</h3>
      <p>body text body text</p>

      <div class="small-stars">
        <span>★</span>
        <span>★</span>
        <span>★</span>
      </div>
    </div>

    <div class="box">
      <div class="star big">★</div>
      <button class="btn">play button</button>
    </div>
  </div>
</section>

<!-- SECTION 3 -->
<section class="section bottom">
  <div class="mini">
    <div class="star">★</div>
    <div>
      <h3>head text</h3>
      <p>body text</p>
    </div>
  </div>

  <div class="mini">
    <div class="star">★</div>
    <div>
      <h3>head text</h3>
      <p>body text</p>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="dots">
    <div></div>
    <div></div>
    <div></div>
  </div>
  <p>sosmed logo</p>
</footer>

</body>
</html>
